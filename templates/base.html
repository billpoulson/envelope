<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Envelope{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_path('/static/style.css') }}">
</head>
<body>
  {% block header %}
  <header class="top">
    <a class="brand" href="{{ url_path('/') }}">Envelope</a>
    <a class="header-help" href="{{ url_path('/help') }}">Help</a>
    {% block nav %}{% endblock %}
  </header>
  {% endblock %}
  <main class="container">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
