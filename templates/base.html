<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Envelope{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_path('/static/style.css') }}?v={{ asset_version }}">
</head>
<body>
  {% block header %}
  <header class="site-header">
    <div class="top-row">
      <a class="brand" href="{{ url_path('/') }}">Envelope</a>
      <a class="header-help" href="{{ url_path('/help') }}">Help</a>
    </div>
    {% block nav %}{% endblock %}
  </header>
  {% endblock %}
  <main class="{% block main_class %}container{% endblock %}">
    {% block content %}{% endblock %}
  </main>
  <script src="{{ url_path('/static/delete-name-confirm.js') }}?v={{ asset_version }}" defer></script>
  <script src="{{ url_path('/static/nav-admin-menu.js') }}?v={{ asset_version }}" defer></script>
  {% block page_scripts %}{% endblock %}
</body>
</html>
