{% extends "base.html" %}
{% block title %}Login — Envelope{% endblock %}
{% block content %}
<h1>Sign in</h1>
<p class="muted">Paste an <strong>admin</strong> API key. Keys are never stored in the browser after login.</p>
{% if error %}
<p class="error">{{ error }}</p>
{% endif %}
<form method="post" action="/login" class="stack">
  <input type="hidden" name="csrf" value="{{ csrf_token }}">
  <label for="api_key">API key</label>
  <input id="api_key" name="api_key" type="password" autocomplete="off" required>
  <button type="submit">Continue</button>
</form>
{% endblock %}
