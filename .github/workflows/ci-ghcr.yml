name: CI

on:
  pull_request:
  push:
    branches:
      - master
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-test-publish:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Test
        run: python -m unittest discover -s tests -v

      - name: pip-audit (Python dependencies)
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: npm audit (frontend)
        working-directory: frontend
        run: npm ci && npm audit --audit-level=high

      - name: Bandit (SAST)
        run: |
          pip install bandit
          bandit -r app cli -c bandit.yaml -ll

      # Self-hosted: Docker Engine must be running and the runner user must access the API
      # (e.g. Linux: /var/run/docker.sock + user in `docker` group; WSL: enable Docker Desktop
      # integration for this distro, or install docker.io inside WSL and start the service).
      - name: Verify Docker daemon
        run: docker version && docker info

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image name (GHCR lowercase)
        id: image
        run: echo "name=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main' }}

      - name: Build and push
        id: docker_build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: image
          image-ref: ${{ steps.docker_build.outputs.imageid }}
          severity: CRITICAL,HIGH
          exit-code: "1"
          trivyignores: .trivyignore
