name: Envelope opaque env
description: Fetch environment variables from an Envelope opaque /env/ URL with Node 20
author: Envelope

branding:
  icon: package
  color: blue

inputs:
  envelope-url:
    description: Deployment base URL (include gateway path prefix if used). Required unless opaque-env-url is set.
    required: false
    default: ""
  token:
    description: Opaque path token from Secret env URL. Required unless opaque-env-url is set.
    required: false
    default: ""
  opaque-env-url:
    description: Full opaque env URL (alternative to envelope-url + token). JSON export is requested automatically.
    required: false
    default: ""
  out-file:
    description: Path for the written dotenv or JSON file (cleartext secrets). Defaults to runner temp/envelope.env.
    required: false
    default: ""
  out-format:
    description: File format when writing out-file
    required: false
    default: dotenv
  export-to-github-env:
    description: If true, append all variables to GITHUB_ENV for later steps in the job
    required: false
    default: "false"
  insecure-http:
    description: Set to true only for local HTTP testing (sets ENVELOPE_CLI_INSECURE=1). Not for production.
    required: false
    default: "false"
  retry-timeout-seconds:
    description: Maximum time to wait for the Envelope env endpoint to become available.
    required: false
    default: "120"
  retry-interval-seconds:
    description: Seconds to wait between Envelope env fetch attempts.
    required: false
    default: "5"

outputs:
  out-file:
    description: Absolute path to the written file (when out-file was used)

runs:
  using: node20
  main: envelope_env.js
