services:
  envelope:
    build:
      context: .
      args:
        # Optional: set in `.env` so each image build gets a distinct UI version (default empty → calver in Docker is 1 per clean build).
        VITE_BUILD_NUMBER: ${VITE_BUILD_NUMBER:-}
    ports:
      - "8080:8080"
    environment:
      ENVELOPE_MASTER_KEY: ${ENVELOPE_MASTER_KEY:?set ENVELOPE_MASTER_KEY}
      ENVELOPE_SESSION_SECRET: ${ENVELOPE_SESSION_SECRET:?set ENVELOPE_SESSION_SECRET}
      ENVELOPE_DATABASE_URL: sqlite+aiosqlite:////data/envelope.db
      # Optional: full-database restore via API/web (default false)
      ENVELOPE_RESTORE_ENABLED: ${ENVELOPE_RESTORE_ENABLED:-false}
      # First run only: creates admin API key in DB, then remove from compose/env
      ENVELOPE_INITIAL_ADMIN_KEY: ${ENVELOPE_INITIAL_ADMIN_KEY:-}
      # Optional — reverse proxy / gateway (see README “Behind a gateway”)
      # FORWARDED_ALLOW_IPS: ${FORWARDED_ALLOW_IPS:-127.0.0.1}
      # ENVELOPE_ROOT_PATH: ${ENVELOPE_ROOT_PATH:-}
      # ENVELOPE_HTTPS_COOKIES: ${ENVELOPE_HTTPS_COOKIES:-false}
    volumes:
      - envelope_data:/data

volumes:
  envelope_data:
